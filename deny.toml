[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "Unicode-DFS-2016",
    # Independent JPEG Group License. Reaches us only through jpeg-encoder
    # (license `(MIT OR Apache-2.0) AND IJG`), the baseline-guaranteed grayscale
    # JPEG encoder the image pipeline (M5) relies on: it ports the IJG reference
    # quantization/Huffman tables, hence the IJG term. IJG is a permissive,
    # FSF Free/Libre license (attribution only, commercial use allowed). Flagged
    # for review rather than added silently.
    "IJG",
]

[advisories]
ignore = [
    # fxhash is unmaintained. It reaches us only transitively, through
    # kuchikiki -> selectors -> fxhash; we do not use selectors' CSS matching,
    # and there is no vulnerability here (unmaintained-only advisory). Nothing
    # in our dependency tree lets us swap it out, so we accept it.
    "RUSTSEC-2025-0057",
    # ttf-parser is unmaintained (author has stated no further fixes). It reaches
    # us only transitively, through resvg -> usvg -> {fontdb, rustybuzz} ->
    # ttf-parser, the SVG rasterizer the image pipeline (M6) relies on. This is
    # an unmaintained-only advisory: no vulnerability, and no safe upgrade is
    # available. resvg's whole font/text stack is built on ttf-parser, so nothing
    # in our tree lets us swap it out. Flagged for review rather than added
    # silently.
    "RUSTSEC-2026-0192",
    # rustybuzz is unmaintained (superseded by harfrust upstream). Same story
    # as ttf-parser above: it reaches us only through resvg -> usvg ->
    # rustybuzz, the text-shaping half of the SVG rasterizer. Unmaintained-only
    # advisory, no vulnerability, no safe upgrade until resvg itself moves to
    # harfrust. Flagged for review rather than added silently.
    "RUSTSEC-2026-0206",

    # --- Tauri desktop GUI tree (app/src-tauri) ---
    # Everything below reaches us only through the Tauri v2 stack that powers the
    # desktop app. All are unmaintained-only advisories: no vulnerability, and no
    # safe upgrade until Tauri itself moves off these crates. Reviewed and added
    # one RUSTSEC ID at a time, no wildcards.
    #
    # The gtk-rs GTK3 bindings (atk, gdk, gtk and their -sys/-macros crates) are
    # the Linux webview backend, pulled in via tauri -> tauri-runtime-wry and
    # muda. gtk-rs dropped GTK3 for GTK4, but Tauri v2 still targets GTK3 on
    # Linux, so there is no upgrade path from our side. macOS and Windows do not
    # use them at runtime; they are in the lockfile only because cargo deny scans
    # every target.
    "RUSTSEC-2024-0411", # gdkwayland-sys
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0414", # gdkx11-sys
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0417", # gdkx11
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys
    # proc-macro-error is unmaintained (superseded by proc-macro-error2). It
    # reaches us only through the same GTK tree: glib-macros -> glib -> atk ->
    # gtk -> muda -> tauri. Unmaintained-only, no vulnerability, no upgrade until
    # glib-macros moves off it.
    "RUSTSEC-2024-0370",
    # The rust-unic Unicode crates are all unmaintained (the whole
    # open-i18n/rust-unic project is retired). They reach us through
    # tauri-utils -> urlpattern -> unic-ucd-ident. Unmaintained-only, no
    # vulnerability, no safe upgrade until urlpattern drops rust-unic.
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
]

[bans]
multiple-versions = "allow"

